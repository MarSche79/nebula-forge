mcs.metadata:
  componentName: Conversation Start
  description: This system topic triggers when the agent receives an Activity indicating the beginning of a new conversation. If you do not want the agent to initiate the conversation, disable this topic.
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: sendMessage_M0LuhV
      activity:
        text:
          - "Hello, I'm {System.Bot.Name} — the central concierge for the Nebula Forge station. I can route you to one of nine specialist agents, answer general station questions, or analyse any document you upload (PDF, Word, Excel, PowerPoint, CSV, text). Files you share are governed by your tenant's Microsoft Purview policies — sensitivity labels, DLP, and DSPM for AI all apply. How can I help?"
        speak:
          - Hello and thank you for calling {System.Bot.Name}, powered by generative AI. You can ask me a question or attach a document for analysis. How may I help you today?